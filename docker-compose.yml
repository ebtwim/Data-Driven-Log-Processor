version: '3.8'

services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports: ["2181:2181"]

  kafka:
    image: wurstmeister/kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "sensor-topic:1:1"
    depends_on:
      - zookeeper

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: log_db
    ports: ["5432:5432"]

  api:
    build: ./api
    ports: ["8000:8000"]
    depends_on: ["kafka"]
    restart: always  
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  worker:
    build: ./worker
    depends_on: ["kafka", "postgres"]
    restart: always  